# pickle-base.conf — base nginx wiring the proxy-agent depends on (LXC 100).
#
# Placed once by deploy.sh, INCLUDED from the http{} block of the main nginx.conf
# (NOT owned by the agent — the agent only writes /etc/nginx/pickle.d/<fqdn>.conf).
# The agent-rendered vhosts rely on the two things defined here.

# 1) websocket upgrade map — the shared proxy-common snippet in every rendered vhost
#    sets `Connection $connection_upgrade`, which resolves via this map. Defining it
#    once here (http{} context) keeps each vhost a self-contained single file.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 2) the agent-managed include glob. Every FQDN's server blocks live under here.
#    `nginx -t` validates these together with the rest of the config, which is why
#    the agent writes into this dir then tests, rolling back on failure.
include /etc/nginx/pickle.d/*.conf;

# NOTE (operator-managed, referenced by rendered vhosts, NOT written by the agent):
#   /etc/nginx/pickle-realip.conf  — the Cloudflare set_real_ip_from ranges, e.g.
#       set_real_ip_from 173.245.48.0/20;
#       ... (Cloudflare published ranges) ...
#   Rendered vhosts `include` this file and set `real_ip_header CF-Connecting-IP`.
#
# NOTE (stream{} SNI, docs/plan/06-domains-tls.md): the stream block owns :443 and
# routes non-passthrough SNIs to 127.0.0.1:8443 (where the agent's HTTPS vhosts
# listen). The opus.pusan.ac.kr passthrough entry stays explicit and is inviolable.
# worker_shutdown_timeout should be set (e.g. 3600s) in the main nginx.conf so that
# graceful reloads do not sever long-lived WebSocket (web-terminal) connections.
